<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Logo Manager – Sadri Villa</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f6f9;
  padding: 30px;
}
.card {
  background: #fff;
  padding: 22px;
  border-radius: 18px;
  max-width: 600px;
  box-shadow: 0 12px 30px rgba(0,0,0,.08);
}
  .upload-box{
  border:2px dashed #cbd5e1;
  border-radius:16px;
  padding:20px;
  text-align:center;
  margin-bottom:15px;
  background:#f8fafc;
}

.select-btn{
  display:inline-block;
  background:#2563eb;
  color:#fff;
  padding:10px 18px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.select-btn:hover{
  background:#1d4ed8;
}

.upload-box.dragover{
  border-color:#2563eb;
  background:#eef2ff;
}
button {
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
}
.msg {
  margin-top: 12px;
  font-size: 14px;
}
.msg.error { color: #991b1b; }
.msg.success { color: #065f46; }
.msg.loading { color: #1d4ed8; }
/* ===== Spinner ===== */
.spinner {
  display: none;
  width: 24px;
  height: 24px;
  border: 3px solid #e5e7eb;
  border-top: 3px solid #2563eb;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 10px auto 0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

</style>
</head>

<body>

<h2>Admin Logo Manager – Sadri Villa</h2>

<div class="card">
  <h3>Upload Logo</h3>
<div class="upload-box" id="uploadBox">

  <input type="file" id="logoInput" accept="image/*" hidden>

  <label for="logoInput" class="select-btn">
    📷 Select Logo
  </label>

  <p style="margin-top:10px;color:#64748b;font-size:13px">
    or drag & drop logo here
  </p>

</div>
  <!-- ✅ Preview Container -->
<div id="logoPreviewBox" style="
  display:none;
  margin-bottom:15px;
  text-align:center;
">
  <img id="logoPreviewImg" 
       style="max-width:200px;height:120px;object-fit:contain;border-radius:12px;">
  <div id="logoPreviewName"
       style="font-size:12px;margin-top:8px;color:#475569;"></div>
</div>
<button id="uploadBtn" onclick="uploadLogo()" disabled style="opacity:.5;cursor:not-allowed">
Upload Logo
</button>
<div id="progressBox" style="margin-top:12px;display:none">
  <div style="height:8px;background:#e5e7eb;border-radius:10px;overflow:hidden">
    <div id="progressFill" style="height:100%;width:0%;background:#2563eb"></div>
  </div>
  <div id="progressText" style="font-size:12px;margin-top:6px;color:#475569">
    Waiting...
  </div>
</div>
<div id="uploadSpinner" class="spinner"></div>
  <div class="msg" id="logoMsg"></div>
</div>

<hr style="margin:30px 0">

<h3>Uploaded Logos</h3>
<div id="logoList" style="
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
"></div>


<script>
/* ---------- FIREBASE INIT ---------- */
firebase.initializeApp({
  apiKey: "AIzaSyC7gkT4F_dRJpWfef12y6cwV3F2PTMJ6fY",
  authDomain: "sadri-villa-14c06.firebaseapp.com",
  projectId: "sadri-villa-14c06",
  storageBucket: "sadri-villa-14c06.firebasestorage.app"
});

const db = firebase.firestore();
  const storage = firebase.storage();
const logoPreview = document.getElementById("logoList");

/* ---------- PREVIEW BEFORE UPLOAD ---------- */
const logoInput = document.getElementById("logoInput");
  const uploadBox = document.getElementById("uploadBox");

/* DRAG EVENTS */
uploadBox.addEventListener("dragover",e=>{
  e.preventDefault();
  uploadBox.classList.add("dragover");
});

uploadBox.addEventListener("dragleave",()=>{
  uploadBox.classList.remove("dragover");
});

uploadBox.addEventListener("drop",e=>{
  e.preventDefault();
  uploadBox.classList.remove("dragover");

  const file = e.dataTransfer.files[0];
  if(!file) return;

  logoInput.files = e.dataTransfer.files;

  const reader = new FileReader();
  reader.onload = ev=>{
    previewImg.src = ev.target.result;
    previewName.innerText = file.name;
    previewBox.style.display = "block";
    document.getElementById("uploadBtn").disabled = false;
document.getElementById("uploadBtn").style.opacity = "1";
document.getElementById("uploadBtn").style.cursor = "pointer";
  };

  reader.readAsDataURL(file);
});
const previewBox = document.getElementById("logoPreviewBox");
const previewImg = document.getElementById("logoPreviewImg");
const previewName = document.getElementById("logoPreviewName");

logoInput.addEventListener("change", () => {
  const file = logoInput.files[0];
  if (!file) {
    previewBox.style.display = "none";
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    previewImg.src = e.target.result;
    previewName.innerText = file.name;
    previewBox.style.display = "block";
    document.getElementById("uploadBtn").disabled = false;
document.getElementById("uploadBtn").style.opacity = "1";
document.getElementById("uploadBtn").style.cursor = "pointer";
  };

  reader.readAsDataURL(file);
});


/* ---------- LOAD CURRENT LOGO ---------- */
db.collection("siteSettings")
  .doc("home")
  .onSnapshot(doc => {

    logoPreview.innerHTML = "";

    if (!doc.exists) return;

    const logo = doc.data().logo;
    if (!logo || !logo.url) return;

    // Extract file name
    const fileName = logo.url.split("/").pop().split("?")[0];

    logoPreview.innerHTML = `
      <div style="
        background:#fff;
        padding:15px;
        border-radius:14px;
        box-shadow:0 6px 18px rgba(0,0,0,.08);
        text-align:center;
        max-width:300px;
      ">
        <img src="${logo.url}?t=${Date.now()}" 
             style="max-width:100%;height:100px;object-fit:contain">

        <div style="
          margin-top:10px;
          font-size:13px;
          color:#475569;
          word-break:break-all;
        ">
          ${fileName}
        </div>
      </div>
    `;
});


/* ---------- AUTH CHECK ---------- */
let authReady = false;

firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    alert("Admin login required");
    location.href = "/login.html";
    return;
  }
  authReady = true;
});

/* ---------- UPLOAD LOGO (DIRECT STORAGE) ---------- */
async function uploadLogo(){

  const file = document.getElementById("logoInput").files[0];
  const msg = document.getElementById("logoMsg");
  const progressFill = document.getElementById("progressFill");
  const progressBox = document.getElementById("progressBox");
  const progressText = document.getElementById("progressText");
  const uploadBtn = document.getElementById("uploadBtn");

  if(!authReady){
    msg.className="msg error";
    msg.innerText="Please wait...";
    return;
  }

  if(!file){
    msg.className="msg error";
    msg.innerText="Please select logo";
    return;
  }

  uploadBtn.disabled=true;
  progressBox.style.display = "block";
progressFill.style.width = "0%";
progressText.innerText = "Starting upload...";

 const logoFolder = storage.ref("images/site/logo");
const storageRef = logoFolder.child(Date.now() + "-" + file.name);

  const uploadTask = storageRef.put(file);

  uploadTask.on("state_changed",

    function(snapshot){

      const percent = Math.round(
        (snapshot.bytesTransferred / snapshot.totalBytes) * 100
      );

      progressFill.style.width = percent + "%";
      progressText.innerText = percent + "% Uploading";

    },

    function(error){

      msg.className="msg error";
      msg.innerText="Upload failed";
      uploadBtn.disabled=false;

    },

    async function(){

const url = await uploadTask.snapshot.ref.getDownloadURL();

/* DELETE OLD LOGO */
try{
  const old = await db.collection("siteSettings")
    .doc("home").get();

  const oldUrl = old.data()?.logo?.url;

  if(oldUrl){

    const oldPath = decodeURIComponent(
      oldUrl.split("/o/")[1].split("?")[0]
    );

    await storage.ref(oldPath).delete();

  }

}catch(e){
  console.log("Old logo delete skipped");
}
      await db.collection("siteSettings")
        .doc("home")
        .set({
          logo:{
            url:url
          }
        },{merge:true});

      progressFill.style.width="100%";
      progressText.innerText="✅ Upload Complete";

      msg.className="msg success";
      msg.innerText="Logo uploaded successfully";

      uploadBtn.disabled=false;

      document.getElementById("logoInput").value="";
      uploadBtn.disabled = true;
uploadBtn.style.opacity = ".5";
uploadBtn.style.cursor = "not-allowed";
      previewBox.style.display="none";

    }

  );

}
</script>


</body>
</html>
