<!DOCTYPE html>
<html>
<head>
  <title>Admin - Digital Shajra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f6f1e7;
      margin:0;
      padding:30px;
    }

    h2{margin:0;}

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .btn{
      padding:8px 14px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      font-size:13px;
    }

    .primary{background:#000;color:white;}
    .danger{background:#c0392b;color:white;}
    .gray{background:gray;color:white;}

    .card{
      background:white;
      border:3px solid #000;
      border-radius:12px;
      padding:20px;
      margin-bottom:20px;
    }

    /* FILTER ROW SINGLE LINE */
    .filter-row{
      display:flex;
      gap:15px;
      align-items:center;
      flex-wrap:nowrap;
    }

    .filter-row input,
    .filter-row select{
      flex:1;
    }

    input, select{
      padding:10px;
      border:2px solid #000;
      border-radius:8px;
      width:100%;
      box-sizing:border-box;
      font-size:14px;
    }

    /* GRID CARDS */
    #memberList{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap:20px;
      margin-top:20px;
    }

    .member-card{
      background:white;
      border:3px solid #000;
      border-radius:12px;
      padding:20px;
      text-align:center;
    }

    .profile-img{
      width:100px;
      height:100px;
      border-radius:12px;
      object-fit:cover;
      border:2px solid #000;
      margin-bottom:10px;
    }

    .actions{
      margin-top:10px;
      display:flex;
      justify-content:center;
      gap:10px;
    }

    #pagination{
      display:flex;
      justify-content:center;
      gap:8px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    .page-btn{
      padding:6px 10px;
      border:2px solid #000;
      cursor:pointer;
      border-radius:6px;
      background:white;
    }

    .active-page{
      background:black;
      color:white;
    }

    /* ===== FIXED MODAL ===== */
    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:9999;
      overflow-y:auto;
    }

    .modal-inner{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:40px 10px;
    }

    .modal-content{
      background:white;
      padding:25px;
      border-radius:12px;
      width:420px;
      border:3px solid #000;
    }

    .modal-content label{
      font-weight:bold;
      margin-top:10px;
      display:block;
    }

    .preview-img{
      width:100px;
      height:100px;
      object-fit:cover;
      border:2px solid #000;
      border-radius:12px;
      margin-top:10px;
      display:none;
    }

    #notification{
      position:fixed;
      top:20px;
      right:20px;
      padding:15px 20px;
      border-radius:10px;
      color:white;
      display:none;
      font-weight:bold;
      z-index:9999;
    }

  </style>
</head>

<body>

<div id="notification"></div>

<div class="top-bar">
  <h2>Family Members</h2>
  <button class="btn primary" onclick="openModal()">+ Add Member</button>
</div>

<div class="card filter-row">
  <input type="text" id="searchInput" placeholder="Search member...">
  <select id="generationFilter">
    <option value="">All Generations</option>
  </select>
  <button class="btn gray" onclick="resetFilters()">Reset</button>
</div>

<div id="memberList"></div>
<div id="pagination"></div>

<!-- ADD / EDIT MODAL -->
<div id="memberModal" class="modal">
  <div class="modal-inner">
    <div class="modal-content">
      <h3 id="modalTitle">Add Member</h3>

      <label>Full Name</label>
      <input type="text" id="name">

      <label>Father Name</label>
      <select id="fatherSelect"></select>

      <label>Surname</label>
      <input type="text" id="surname">

      <label>Date of Birth</label>
      <input type="date" id="dob">

      <label>Title</label>
      <input type="text" id="title">

      <label>Profile Image</label>
      <input type="file" id="profileImage">
      <img id="imagePreview" class="preview-img">

      <br><br>
      <button class="btn primary" onclick="saveMember()">Save</button>
      <button class="btn gray" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
let editingId = null;

function openModal(){
  editingId = null;
  document.getElementById("modalTitle").innerText="Add Member";
  document.getElementById("memberModal").style.display="block";
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.getElementById("memberModal").style.display="none";
  document.body.style.overflow="auto";
  clearForm();
}

document.getElementById("profileImage").addEventListener("change",function(e){
  const file=e.target.files[0];
  const preview=document.getElementById("imagePreview");
  if(file){
    preview.src=URL.createObjectURL(file);
    preview.style.display="block";
  }
});

window.showMessage=function(msg,type="success"){
  const box=document.getElementById("notification");
  box.innerText=msg;
  box.style.display="block";
  box.style.background= type==="error" ? "#dc2626" : "#16a34a";
  setTimeout(()=>box.style.display="none",3000);
};
</script>

<script type="module" src="js/admin-crud.js"></script>

</body>
</html>
