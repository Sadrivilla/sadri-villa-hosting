<!DOCTYPE html>
<html>
<head>
  <title>Admin - Digital Shajra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f6f1e7;
  margin:0;
  padding:30px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.btn{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  font-size:13px;
}

.primary{background:#000;color:white;}
.danger{background:#c0392b;color:white;}
.gray{background:gray;color:white;}

.card{
  background:white;
  border:3px solid #000;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

.filter-row{
  display:flex;
  gap:15px;
  align-items:center;
}

.filter-row > div:first-child{
  flex:2;   /* search bigger */
}

.filter-row select{
  flex:1;   /* generation smaller */
}

.filter-row button{
  flex:0;   /* reset fixed */
}

input, select{
  padding:10px;
  border:2px solid #000;
  border-radius:8px;
  width:100%;
  box-sizing:border-box;
}

#memberList{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap:20px;
}

.member-card{
  background:white;
  border:3px solid #000;
  border-radius:12px;
  padding:20px;
  text-align:center;
}

.profile-img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #000;
  margin-bottom:10px;
}

.actions{
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

#pagination{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:20px;
  flex-wrap:wrap;
}

.page-btn{
  padding:6px 10px;
  border:2px solid #000;
  cursor:pointer;
  border-radius:6px;
  background:white;
}

.active-page{
  background:black;
  color:white;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:12px;
  width:420px;
  border:3px solid #000;
}

#notification{
  position:fixed;
  top:20px;
  right:20px;
  padding:15px 20px;
  border-radius:10px;
  color:white;
  display:none;
  font-weight:bold;
  z-index:9999;
}

#loader{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-circle{
  width:60px;
  height:60px;
  border:6px solid #eee;
  border-top:6px solid black;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

#searchDropdown{
  position:absolute;
  top:45px;
  left:0;
  right:0;
  background:white;
  border:2px solid #000;
  border-radius:8px;
  max-height:200px;
  overflow-y:auto;
  display:none;
  z-index:999;
}
</style>
</head>

<body>

<div id="toastContainer"></div>

<div class="top-bar">
  <h2>Family Members</h2>
  <button class="btn primary" onclick="openAddModal()">+ Add Member</button>
</div>

<div class="card filter-row">
  <div style="flex:1; position:relative;">
    <input type="text" id="searchInput" placeholder="Search member...">
    <div id="searchDropdown"></div>
  </div>

  <select id="generationFilter">
    <option value="">All Generations</option>
  </select>

  <button class="btn gray" onclick="resetFilters()">Reset</button>
</div>

<div id="memberList"></div>
<div id="pagination"></div>

<div id="memberModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add Member</h3>

    <!-- Profile Preview -->
    <div style="text-align:center;margin-bottom:15px;">
      <div id="profilePreviewBox" 
           style="width:100px;height:100px;border-radius:50%;
                  border:2px solid #000;margin:auto;
                  display:flex;align-items:center;
                  justify-content:center;font-size:22px;
                  font-weight:bold;background:#ddd;">
        ?
      </div>
    </div>

    <label>Profile Image</label>
    <input type="file" id="profileImage" accept="image/*">

    <label>Full Name</label>
    <input type="text" id="name">

    <label>Father Name</label>
    <select id="fatherSelect"></select>

    <label>Surname</label>
    <input type="text" id="surname">

    <label>Date of Birth</label>
    <input type="date" id="dob">

    <label>Title</label>
    <input type="text" id="title">

    <br><br>
    <button class="btn primary" onclick="saveMember()">Save</button>
    <button class="btn gray" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div id="loader">
  <div class="loader-circle"></div>
</div>

<script type="module" src="js/admin-crud.js"></script>
</body>
</html>
