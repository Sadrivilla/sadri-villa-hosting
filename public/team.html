<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team | Sadri Villa</title>

<style>
body{margin:0;font-family:Arial;background:#f8fafc}

/* NAVBAR SAME THEME */
.navbar{
position:fixed;top:0;width:100%;
height:55px;
display:flex;justify-content:space-between;align-items:center;
background:rgba(255,255,255,.25);
backdrop-filter:blur(10px);
padding:0 20px;
z-index:1000;
}

.navbar a{
padding:8px 16px;
border-radius:20px;
background:linear-gradient(135deg,#38bdf8,#60a5fa);
color:white;text-decoration:none;font-weight:600;
}

/* HEADER */
.header{
padding-top:90px;text-align:center;
}
.header h1{font-size:34px}

/* GRID */
.team-container{
max-width:1200px;
margin:40px auto;
display:grid;

/* 🔥 FORCE HORIZONTAL GRID */
grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));

gap:25px;
padding:20px;
}


/* CARD */
.team-card{
background:white;
border-radius:25px;
padding:25px;
text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,.08);
transition:.3s;
}
.team-card:hover{
transform:translateY(-8px);
box-shadow:0 0 0 1px #38bdf8,0 28px 55px rgba(56,189,248,.35);
}

.team-img{
width:120px;height:120px;
border-radius:50%;object-fit:cover;
margin-bottom:15px;
}

.role{
color:#38bdf8;font-weight:700;margin:5px 0;
}

.desc{
font-size:14px;color:#475569;
}

.social a{
display:inline-block;
margin:5px;
padding:6px 10px;
border-radius:8px;
color:white;text-decoration:none;font-size:13px;
}
.fb{background:#1877f2}
.insta{background:#e1306c}
.linkedin{background:#0a66c2}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="team-admin.html">Admin</a>
</div>

<div class="header">
<h1>Our Management Team</h1>
</div>

<div id="teamContainer" class="team-container"></div>

<!-- 🔥 IMAGE MODAL (PASTE HERE) -->
<div id="imgModal" style="
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:2000;
">

<img id="modalImg" style="
max-width:90%;
max-height:90%;
border-radius:12px;
">

</div>  

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyC7gkT4F_dRJpWfef12y6cwV3F2PTMJ6fY",
authDomain:"sadri-villa-14c06.firebaseapp.com",
projectId:"sadri-villa-14c06"
});

const db = getFirestore(app);
const container = document.getElementById("teamContainer");

const q = query(collection(db,"team"),orderBy("order"));

onSnapshot(q,(snapshot)=>{
container.innerHTML="";

snapshot.forEach(doc=>{
const d = doc.data();
if(d.enabled===false) return;

const card = document.createElement("div");
card.className="team-card";

card.innerHTML=`
<img src="${d.imageUrl || ''}" class="team-img" onclick="openImage('${d.imageUrl}')">
<h3>${d.name}</h3>
<div class="role">${d.role}</div>
<div class="desc">${d.description || ''}</div>
<div class="social">
${d.facebook ? `<a href="${d.facebook}" target="_blank" class="fb">FB</a>`:""}
${d.instagram ? `<a href="${d.instagram}" target="_blank" class="insta">IG</a>`:""}
${d.linkedin ? `<a href="${d.linkedin}" target="_blank" class="linkedin">IN</a>`:""}
</div>
`;

container.appendChild(card);
});
});
  // 🔥 ADD THIS BELOW
window.openImage = function(src){
if(!src) return;

document.getElementById("modalImg").src = src;
document.getElementById("imgModal").style.display = "flex";
};

document.getElementById("imgModal").onclick = function(){
this.style.display = "none";
};
</script>

</body>
</html>
