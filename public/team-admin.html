<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Admin</title>

<style>
body{margin:0;font-family:Arial;background:#081634;color:white;}
.header{padding:20px;text-align:center;background:#020617;}
.form{max-width:700px;margin:30px auto;background:#0f172a;padding:25px;border-radius:15px;display:none;}
input,textarea{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none;}
button{padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.btn-primary{background:linear-gradient(135deg,#38bdf8,#60a5fa);color:white;width:100%;}
.list{max-width:1000px;margin:30px auto;display:none;}
.card{background:#0f172a;padding:15px;margin:10px 0;border-radius:12px;display:flex;justify-content:space-between;flex-wrap:wrap;}
.controls{display:flex;gap:5px;}
.edit{background:#38bdf8;color:white}
.delete{background:red;color:white}
.toggle{background:#22c55e;color:white}
.disable{background:#64748b;color:white}

/* LOGIN */
.login{
max-width:400px;
margin:80px auto;
background:#0f172a;
padding:25px;
border-radius:15px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<h2>Team Admin Panel</h2>
</div>

<!-- LOGIN -->
<div id="loginBox" class="login">
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()" class="btn-primary">Login</button>
</div>

<!-- FORM -->
<div class="form" id="adminPanel">
<input id="name" placeholder="Name">
<input id="role" placeholder="Role">
<textarea id="desc" placeholder="Description"></textarea>

<input id="facebook" placeholder="Facebook URL">
<input id="instagram" placeholder="Instagram URL">
<input id="linkedin" placeholder="LinkedIn URL">

<input id="order" type="number" placeholder="Order">
<input type="file" id="image">

<button class="btn-primary" onclick="saveMember()">Save Member</button>
</div>

<div id="list" class="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyC7gkT4F_dRJpWfef12y6cwV3F2PTMJ6fY",
authDomain:"sadri-villa-14c06.firebaseapp.com",
projectId:"sadri-villa-14c06",
storageBucket:"sadri-villa-14c06.appspot.com"
});

const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

let editId = null;

/* LOGIN */
window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth,email,password);
  }catch(e){
    alert(e.message);
  }
};

/* AUTH CHECK */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    document.getElementById("loginBox").style.display="block";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));

  if(!snap.exists() || snap.data().role !== "admin"){
    alert("Access denied");
    return;
  }

  // SHOW PANEL
  document.getElementById("loginBox").style.display="none";
  document.getElementById("adminPanel").style.display="block";
  document.getElementById("list").style.display="block";
});

/* SAVE */
window.saveMember = async function(){

if(!auth.currentUser){
  alert("Login required");
  return;
}

const file = document.getElementById("image").files[0];
let imageUrl = "";

if(file){
const storageRef = ref(storage,"team/"+Date.now());
await uploadBytes(storageRef,file);
imageUrl = await getDownloadURL(storageRef);
}

const data = {
name:document.getElementById("name").value,
role:document.getElementById("role").value,
description:document.getElementById("desc").value,
facebook:document.getElementById("facebook").value,
instagram:document.getElementById("instagram").value,
linkedin:document.getElementById("linkedin").value,
order:Number(document.getElementById("order").value || 0),
};

if(imageUrl) data.imageUrl = imageUrl;

if(editId){
await updateDoc(doc(db,"team",editId),data);
editId = null;
alert("Updated!");
}else{
data.enabled = true;
await addDoc(collection(db,"team"),data);
alert("Added!");
}

clearForm();
};

/* CLEAR */
function clearForm(){
["name","role","desc","facebook","instagram","linkedin","order","image"]
.forEach(id=>document.getElementById(id).value="");
}

/* LOAD LIST */
const list = document.getElementById("list");

onSnapshot(collection(db,"team"),snap=>{
list.innerHTML="";
let arr=[];
snap.forEach(d=>arr.push({id:d.id,...d.data()}));
arr.sort((a,b)=>a.order-b.order);

arr.forEach(d=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div>
<strong>${d.name}</strong> (${d.role})<br>
Order: ${d.order} | ${d.enabled ? "Active":"Disabled"}
</div>

<div class="controls">
<button onclick="edit('${d.id}')" class="edit">Edit</button>
<button onclick="toggle('${d.id}',${d.enabled})" class="${d.enabled?'disable':'toggle'}">
${d.enabled?"Disable":"Enable"}
</button>
<button onclick="del('${d.id}')" class="delete">Delete</button>
</div>
`;

list.appendChild(div);
});
});

/* EDIT */
window.edit = async function(id){
const snap = await getDoc(doc(db,"team",id));
const d = snap.data();
editId=id;

name.value=d.name;
role.value=d.role;
desc.value=d.description;
facebook.value=d.facebook;
instagram.value=d.instagram;
linkedin.value=d.linkedin;
order.value=d.order;
};

/* DELETE */
window.del = async id=> await deleteDoc(doc(db,"team",id));

/* TOGGLE */
window.toggle = async (id,status)=>{
await updateDoc(doc(db,"team",id),{enabled:!status});
};
</script>

</body>
</html>
