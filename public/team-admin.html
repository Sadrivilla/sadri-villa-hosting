<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081634;
color:white;
}

/* HEADER */
.header{
padding:20px;
text-align:center;
background:#020617;
}

/* FORM */
.form{
max-width:700px;
margin:30px auto;
background:#0f172a;
padding:25px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-primary{
background:linear-gradient(135deg,#38bdf8,#60a5fa);
color:white;
width:100%;
}

.btn-small{
padding:6px 10px;
margin:2px;
font-size:12px;
}

.edit{background:#38bdf8;color:white}
.delete{background:red;color:white}
.toggle{background:#22c55e;color:white}
.disable{background:#64748b;color:white}

/* LIST */
.list{
max-width:1000px;
margin:30px auto;
}

.card{
background:#0f172a;
padding:15px;
margin:10px 0;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.info{
flex:1;
}

.controls{
display:flex;
gap:5px;
flex-wrap:wrap;
}
</style>
</head>

<body>

<div class="header">
<h2>Team Admin Panel</h2>
</div>

<div class="form">
<input id="name" placeholder="Name">
<input id="role" placeholder="Role">
<div id="multiDesc">

<!-- Repeat block -->
<div>
<textarea id="desc1" placeholder="Description 1"></textarea>
<input type="file" id="image1" onchange="previewImage(1)">
<img id="preview1" style="max-width:100px;display:none;">
</div>

<div>
<textarea id="desc2" placeholder="Description 2"></textarea>
<input type="file" id="image2" onchange="previewImage(2)">
<img id="preview2" style="max-width:100px;display:none;">
</div>

<div>
<textarea id="desc3" placeholder="Description 3"></textarea>
<input type="file" id="image3" onchange="previewImage(3)">
<img id="preview3" style="max-width:100px;display:none;">
</div>

<div>
<textarea id="desc4" placeholder="Description 4"></textarea>
<input type="file" id="image4" onchange="previewImage(4)">
<img id="preview4" style="max-width:100px;display:none;">
</div>

<div>
<textarea id="desc5" placeholder="Description 5"></textarea>
<input type="file" id="image5" onchange="previewImage(5)">
<img id="preview5" style="max-width:100px;display:none;">
</div>

<div>
<textarea id="desc6" placeholder="Description 6"></textarea>
<input type="file" id="image6" onchange="previewImage(6)">
<img id="preview6" style="max-width:100px;display:none;">
</div>

<div>
<textarea id="desc7" placeholder="Description 7"></textarea>
<input type="file" id="image7" onchange="previewImage(7)">
<img id="preview7" style="max-width:100px;display:none;">
</div>

</div>
<input id="facebook" placeholder="Facebook URL">
<input id="instagram" placeholder="Instagram URL">
<input id="linkedin" placeholder="LinkedIn URL">

<input id="order" type="number" placeholder="Order (0,1,2...)">


<button id="saveBtn" class="btn-primary">Save Member</button>
  <div id="progressBox" style="display:none;margin-top:10px;">
  <div style="background:#1e293b;border-radius:6px;height:10px;overflow:hidden;">
    <div id="progressBar" style="height:10px;width:0%;background:#38bdf8;"></div>
  </div>
  <p id="progressText" style="margin-top:5px;font-size:12px;">0%</p>
</div>
</div>

<div id="list" class="list"></div>
  <div id="toast" style="
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:white;
padding:12px 20px;
border-radius:8px;
display:none;
font-weight:bold;
z-index:999;
"></div>
  <script>
function showToast(message, isError=false){
const toast = document.getElementById("toast");

toast.innerText = message;
toast.style.background = isError ? "#ef4444" : "#22c55e";
toast.style.display = "block";

setTimeout(()=>{
toast.style.display = "none";
},3000);
}

function previewImage(num){
const file = document.getElementById("image"+num).files[0];
const preview = document.getElementById("preview"+num);

if(file){
preview.src = URL.createObjectURL(file);
preview.style.display = "block";
}
}
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyC7gkT4F_dRJpWfef12y6cwV3F2PTMJ6fY",
authDomain:"sadri-villa-14c06.firebaseapp.com",
projectId:"sadri-villa-14c06",
storageBucket:"sadri-villa-14c06.firebasestorage.app" // ✅ FIXED
});

const db = getFirestore(app);
const storage = getStorage(app);

let editId = null;

/* SAVE / ADD */
window.saveMember = async function(){
  document.getElementById("saveBtn").innerText="Saving...";
  document.getElementById("progressBox").style.display = "block";
document.getElementById("progressBar").style.width = "0%";
document.getElementById("progressText").innerText = "0%";
document.getElementById("saveBtn").disabled=true;
  const name = document.getElementById("name").value.trim();
const order = document.getElementById("order").value;
const desc1 = document.getElementById("desc1").value.trim();

if(!name || !order || !desc1){
showToast("Name, Order and Description 1 are mandatory", true);
  document.getElementById("progressBox").style.display = "none";

document.getElementById("saveBtn").innerText="Save Member";
document.getElementById("saveBtn").disabled=false;

return;
}



try{
  let descriptions = [];
let images = [];

for(let i=1;i<=7;i++){

let desc = document.getElementById("desc"+i).value.trim();
let file = document.getElementById("image"+i).files[0];

let imageUrl = "";

if(file){
const storageRef = ref(storage,"team/"+Date.now()+"_"+i);

const uploadTask = uploadBytesResumable(storageRef,file);

await new Promise((resolve,reject)=>{

uploadTask.on("state_changed",
(snapshot)=>{
let percent = ((i-1)/7)*100 + ((snapshot.bytesTransferred / snapshot.totalBytes) * (100/7));
  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText = Math.round(percent) + "%";
},
reject,
async ()=>{
  imageUrl = await getDownloadURL(uploadTask.snapshot.ref);
  resolve();
});
  
});
}
if(desc || imageUrl){
descriptions.push(desc);
images.push(imageUrl);
}
}



// ✅ SAFE DATA (NO UNDEFINED)
const data = {
name: name,
role: document.getElementById("role").value || "",
descriptions: descriptions,
images: images,
facebook: document.getElementById("facebook").value || "",
instagram: document.getElementById("instagram").value || "",
linkedin: document.getElementById("linkedin").value || "",
order: Number(order),
enabled: true
};


// ✅ ADD / UPDATE
if(editId){
await updateDoc(doc(db,"team",editId),data);
editId = null;
}else{
await addDoc(collection(db,"team"),data);
}

showToast("Saved Successfully!");
  document.getElementById("progressBox").style.display = "none";

clearForm();
  document.getElementById("saveBtn").innerText="Save Member";
document.getElementById("saveBtn").disabled=false;

}catch(e){
console.error(e);
showToast(e.message, true);
  document.getElementById("progressBox").style.display = "none";

document.getElementById("saveBtn").innerText="Save Member";
document.getElementById("saveBtn").disabled=false;
}

};

/* CLEAR */
function clearForm(){
["name","role","facebook","instagram","linkedin","order"]
.forEach(id=>document.getElementById(id).value="");

for(let i=1;i<=7;i++){
document.getElementById("desc"+i).value="";
document.getElementById("image"+i).value="";
document.getElementById("preview"+i).style.display="none";
}
}

/* LOAD LIST */
const list = document.getElementById("list");

onSnapshot(collection(db,"team"),snap=>{
list.innerHTML="";

let arr=[];
snap.forEach(d=>arr.push({id:d.id,...d.data()}));

// ✅ SAFE SORT
arr.sort((a,b)=>(a.order||0)-(b.order||0));

arr.forEach(d=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="info">
<strong>${d.name || ""}</strong> (${d.role || ""})<br>
Order: ${d.order || 0} | Status: ${d.enabled ? "Active":"Disabled"}
</div>

<div class="controls">
<button class="btn-small edit" onclick="edit('${d.id}')">Edit ✏️</button>
<button class="btn-small ${d.enabled ? "disable":"toggle"}" onclick="toggle('${d.id}',${d.enabled})">
${d.enabled ? "Disable":"Enable"}
</button>
<button class="btn-small delete" onclick="del('${d.id}')">Delete</button>
<button class="btn-small" onclick="move('${d.id}',-1)">⬆</button>
<button class="btn-small" onclick="move('${d.id}',1)">⬇</button>
</div>
`;

list.appendChild(div);
});
});

/* EDIT */
window.edit = async function(id){
const snap = await getDoc(doc(db,"team",id));
const d = snap.data();

editId = id;

document.getElementById("name").value=d.name || "";
document.getElementById("role").value=d.role || "";
document.getElementById("facebook").value=d.facebook || "";
document.getElementById("instagram").value=d.instagram || "";
document.getElementById("linkedin").value=d.linkedin || "";
document.getElementById("order").value=d.order || 0;
  if(d.images){
d.images.forEach((img,i)=>{
if(img){
document.getElementById("preview"+(i+1)).src = img;
document.getElementById("preview"+(i+1)).style.display="block";
}
});
}
};

/* DELETE */
window.del = async id=> await deleteDoc(doc(db,"team",id));

/* TOGGLE */
window.toggle = async (id,status)=>{
await updateDoc(doc(db,"team",id),{enabled:!status});
};

/* MOVE */
window.move = async (id,dir)=>{
const snap = await getDoc(doc(db,"team",id));
let current = snap.data().order || 0;

await updateDoc(doc(db,"team",id),{
order: current + dir
});
};
    document.getElementById("saveBtn").addEventListener("click", saveMember);

</script>

</body>
</html>
