<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center}
.container{max-width:600px;margin:40px auto}
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:none}
button{padding:10px;margin-top:10px;border:none;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<h2>Team Admin</h2>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">
<input id="name" placeholder="Name">
<input id="role" placeholder="Role">
<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="image">

<button onclick="save()">Save Member</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyC7gkT4F_dRJpWfef12y6cwV3F2PTMJ6fY",
  authDomain:"sadri-villa-14c06.firebaseapp.com",
  projectId:"sadri-villa-14c06",
  storageBucket:"sadri-villa-14c06.appspot.com"
});

const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

let isAdmin = false;
let authReady = false;

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value.trim(),password.value);
  }catch(e){
    alert(e.message);
  }
};

/* LOGOUT */
window.logout = async ()=>{
  await signOut(auth);
};

/* AUTH + ADMIN CHECK */
onAuthStateChanged(auth, async (user)=>{

  authReady = false;
  isAdmin = false;

  if(!user){
    loginBox.style.display="block";
    panel.style.display="none";
    return;
  }

  try{
    const snap = await getDoc(doc(db,"users",user.uid));

    if(!snap.exists() || snap.data().role !== "admin"){
      alert("Access denied (Not Admin)");
      await signOut(auth);
      return;
    }

    isAdmin = true;
    authReady = true;

    loginBox.style.display="none";
    panel.style.display="block";

  }catch(e){
    console.error(e);
    alert("Error checking admin");
  }

});

/* SAVE */
window.save = async ()=>{

  // 🔴 CRITICAL CHECK (prevents fake CORS error)
  if(!authReady){
    alert("Please wait... auth not ready");
    return;
  }

  if(!auth.currentUser || !isAdmin){
    alert("Not authorized");
    return;
  }

  const nameVal = document.getElementById("name").value.trim();
  const roleVal = document.getElementById("role").value.trim();
  const descVal = document.getElementById("desc").value.trim();
  const file = document.getElementById("image").files[0];

  if(!nameVal){
    alert("Name required");
    return;
  }

  let imageUrl = "";

  try{

    // 🔥 Upload image (safe + stable)
    if(file){
      const storageRef = ref(storage,"team/"+Date.now());

      const uploadTask = uploadBytesResumable(storageRef,file);

      await new Promise((resolve,reject)=>{
        uploadTask.on("state_changed",
          null,
          reject,
          async ()=>{
            imageUrl = await getDownloadURL(uploadTask.snapshot.ref);
            resolve();
          }
        );
      });
    }

    // 🔥 Save to Firestore
    await addDoc(collection(db,"team"),{
      name: nameVal,
      role: roleVal || "",
      description: descVal || "",
      imageUrl: imageUrl || "",
      enabled: true,
      createdAt: new Date().toISOString()
    });

    alert("Saved successfully");

  }catch(e){
    console.error("ERROR:", e);
    alert("Error: " + e.message);
  }

};

</script>

</body>
</html>
